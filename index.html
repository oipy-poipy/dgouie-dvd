<html dogtype="sasa">
    <head>
        <title>OIPY</title>
        <link rel="icon" type="image/x-icon" href="./assets/animegirl.gif">
        <link rel="stylesheet" href="./assets/css/main.css">
        <link rel="stylesheet" href="./assets/css/fonts.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="title" content="oUPUYI">
        <meta name="description" content="sasa">
        <meta name="keywords" content="sasa was here, hello">
        <meta name="robots" content="noindex, nofollow">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="language" content="Portuguese">
        <meta name="revisit-after" content="1 days">
        <meta name="author" content="sasa">
    </head>

    <body>
        <div id="err-container"></div>

        <div id="dvd">
            <img src="./assets/dgouie.png" draggable="false">
        </div>

        <div id="dvd2">
            <img src="./assets/maxrot.gif" draggable="false">
        </div>

        <div id="dvd3">
            <img src="./assets/reispin.gif" draggable="false">
        </div>
        
        <script src="./assets/main.js" charset="utf-8"></script>

        <!--  ---  -->

        <div id="text">
            <p>
                <span style="font-weight: bold; font-size: 40px">da</span>gouie,,,,,,,<br>
                ૮・ﻌ・ა
            </p>

            <p>
                <a style="color: unset" href="mailto:bowl@ouppy.space">oipy mail</a><br>
                the oipy room is at <span id="server-temp"></span> C rn
            </p>

            <div class="player">
                <img
                    src="./assets/player/dog.png"
                    height="100"
                >

                <audio id="femtanylplayer" src="./assets/FEMTANYL.mp3"></audio>
                <div class="player-progress">
                    <input id="femtanyl-progress" type="range" min="0" max="100" value="0" step="0.1">
                </div>
                <div> 
                    <button onclick="document.getElementById('femtanylplayer').play()" class="player-button">
                        <img src="./assets/player/play.png">
                    </button>
                    <button onclick="document.getElementById('femtanylplayer').pause()" class="player-button">
                        <img src="./assets/player/pause.png">
                    </button>
                    <button onclick="document.getElementById('femtanylplayer').volume += 0.1" class="player-button">
                        <img src="./assets/player/volup.png">
                    </button>
                    <button onclick="document.getElementById('femtanylplayer').volume -= 0.1" class="player-button">
                        <img src="./assets/player/voldown.png">
                    </button>
                </div>
            </div>

            <div class="player">
                <img
                    src="./assets/player/train.png"
                    width="300"
                >

                <audio id="trainplayer" src="./assets/TRAIN.mp3"></audio>
                <div class="player-progress">
                    <input id="train-progress" type="range" min="0" max="100" value="0" step="0.1">
                </div>
                <div> 
                    <button onclick="document.getElementById('trainplayer').play()" class="player-button">
                        <img src="./assets/player/play.png">
                    </button>
                    <button onclick="document.getElementById('trainplayer').pause()" class="player-button">
                        <img src="./assets/player/pause.png">
                    </button>
                    <button onclick="document.getElementById('trainplayer').volume += 0.1" class="player-button">
                        <img src="./assets/player/volup.png">
                    </button>
                    <button onclick="document.getElementById('trainplayer').volume -= 0.1" class="player-button">
                        <img src="./assets/player/voldown.png">
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
